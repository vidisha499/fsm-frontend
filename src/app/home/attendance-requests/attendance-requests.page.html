<ion-content [fullscreen]="true" class="premium-wrapper">
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="hero-header">
    <div class="header-overlay"></div>
    <div class="header-content">
      <div class="nav-bar">
        <div class="left-section">
          <button class="glass-btn" (click)="goBack()">
            <ion-icon name="arrow-back-outline"></ion-icon>
          </button>
          <h1>Attendance Requests</h1>
        </div>
        <div class="auth-badge">
          <ion-icon name="shield-checkmark"></ion-icon>
          ADMIN
        </div>
      </div>
    </div>
  </div>

  <div class="card-container">

    
    <div *ngIf="pendingRequests.length === 0" class="main-card no-data-card">
      <div class="scanner-section">
        <ion-icon name="checkmark-done-circle" class="large-icon"></ion-icon>
        <p class="instruction verified">All Requests Processed</p>
      </div>
    </div>

    <div class="main-card request-item animate-in" *ngFor="let req of pendingRequests">
      <div class="user-profile-section">
        <div class="image-frame">
          <img [src]="req.photo" />
          <div class="status-indicator"></div>
        </div>
        <div class="user-detail">
          <h3>{{ req.displayName }}</h3>
          <span class="time-stamp">
            <ion-icon name="time-outline"></ion-icon> {{ req.displayTime }}
          </span>
        </div>
        <div class="status-badge" [ngClass]="(req.status || 'pending').toLowerCase()">
          <ion-icon [name]="req.status === 'approved' ? 'checkmark-circle-outline' : 'alert-circle-outline'"></ion-icon>
          {{ (req.status || 'Pending') | uppercase }}
        </div>
      </div>

      <div style="font-size: 10px; color: #94a3b8; margin: -5px 0 10px 5px; line-height: 1.2;">
        ID: #{{ req.id }} | Status: {{ req.status }}<br>
        Rem: {{ req.remark }}
      </div>

      <div class="info-grid">
        <div class="info-item">
          <label>Location</label>
          <div class="val-box">
            <ion-icon name="location"></ion-icon>
            <span>{{ req.displayLocation }}</span>
          </div>
        </div>
      </div>

      <div class="action-grid">
        <button *ngIf="(req.status || '').toLowerCase() !== 'approved'" class="btn-approve" (click)="approveRequest(req)">
          <ion-icon name="checkmark-circle"></ion-icon> Approve
        </button>
        <button class="btn-reject" (click)="rejectRequest(req)">
          <ion-icon name="close-circle"></ion-icon> Reject
        </button>
      </div>
    </div>
  </div>
</ion-content>
