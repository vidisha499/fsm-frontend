<ion-content [fullscreen]="true" style="--background: #fdfdfd">
  <div
    style="
      position: relative;
      height: 240px;
      background: url(&quot;https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&quot;);
      background-size: cover;
      background-position: center;
      clip-path: ellipse(110% 100% at 50% 0%);
    "
  >
    <div
      style="
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.1),
          rgba(0, 0, 0, 0.7)
        );
      "
    ></div>

    <div
      style="
        position: relative;
        padding: 40px 25px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      "
    >
  <button
  (click)="toggleMenu()"
  style="
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  "
>
  <ion-icon name="menu-outline" style="font-size: 24px"></ion-icon>
</button>

      <div
        style="
          text-align: right;
          display: flex;
          flex-direction: column;
          align-items: flex-end;
        "
      >
        <div class="tracking-pill">
          <div class="active-dot"></div>
          <span>LIVE TRACKING</span>
        </div>
        <p
          class="hero-title"
          style="
            margin: 0;
            font-size: 28px;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
          "
        >{{ rangerName }}
        </p>

      </div>
    </div>
  </div>

  <div class="main-dashboard-content">
    <div class="analytics-hero-card">
      <div class="card-header">
        <span class="label">weekly Patrolled Compartments</span>
      </div>
      <div class="stats-flex">
        <div class="progress-container">
          <svg viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="45"></circle>
            <circle class="meter" cx="50" cy="50" r="45"></circle>
          </svg>
          <div class="percentage-label">
            <span class="value">75%</span>
            <span class="sub">Patrolled</span>
          </div>
        </div>
        <div class="metrics-list">
          <div class="metric-item">
            <div class="indicator green"></div>
            <div class="details">
              <p>12.4 <small>KM</small></p>
              <span>Total Distance</span>
            </div>
          </div>
          <div class="metric-item">
            <div class="indicator blue"></div>
            <div class="details">
              <p>08</p>
              <span>Events & Crimes</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  

    <div class="stats-grid">
      <div class="stat-card" (click)="openEvents()">
        <div class="card-inner">
          <div class="left-content">
            <div class="icon-box orange"><i class="fas fa-bolt"></i></div>
            <div class="info">
              <h3>30</h3>
              <p>Events triggered</p>
            </div>
          </div>
          <div class="chart-box">
            <svg viewBox="0 0 36 36" class="mini-doughnut">
              <circle class="ring-bg" cx="18" cy="18" r="15.9"></circle>
              <circle
                class="ring-fill orange"
                cx="18"
                cy="18"
                r="15.9"
                stroke-dasharray="60, 100"
              ></circle>
              <text x="18" y="20.5" class="chart-text">60%</text>
            </svg>
          </div>
        </div>
      </div>

     <div class="stat-card urgent" (click)="openPatrols()"> <div class="card-inner">
    <div class="left-content">
      <div class="icon-box red">
        <i class="fas fa-map-marked-alt"></i>
      </div>
      <div class="info">
        <h3>08</h3>
        <p>Today's patrols</p>
      </div>
    </div>
    <div class="chart-box">
      <svg viewBox="0 0 36 36" class="mini-doughnut">
        <circle class="ring-bg" cx="18" cy="18" r="15.9"></circle>
        <circle
          class="ring-fill red"
          cx="18"
          cy="18"
          r="15.9"
          stroke-dasharray="85, 100"
        ></circle>
        <text x="18" y="20.5" class="chart-text">85%</text>
      </svg>
    </div>
  </div>
</div>

      <div class="stat-card" (click)="openAttendance()">
  <div class="card-inner">
    <div class="left-content">
      <div class="icon-box blue"><i class="fas fa-user-check"></i></div>
      <div class="info">
        <h3>{{ attendanceCount }}</h3>
        <p>View Attendance</p>
      </div>
    </div>
    <div class="chart-box">
      <svg viewBox="0 0 36 36" class="mini-doughnut">
        <circle class="ring-bg" cx="18" cy="18" r="15.9"></circle>
        <circle
          class="ring-fill blue"
          cx="18"
          cy="18"
          r="15.9"
          [attr.stroke-dasharray]="attendancePercentage + ', 100'"
        ></circle>
        <text x="18" y="20.5" class="chart-text">{{ attendancePercentage }}%</text>
      </svg>
    </div>
  </div>
</div>

      <div class="stat-card" (click)="goToPage('manage-rangers')">
        <div class="card-inner">
          <div class="left-content">
            <div class="icon-box green"><i class="fas fa-user-shield"></i></div>
            <div class="info">
              <h3>45</h3>
              <p>..........</p>
            </div>
          </div>
          <div class="chart-box">
            <svg viewBox="0 0 36 36" class="mini-doughnut">
              <circle class="ring-bg" cx="18" cy="18" r="15.9"></circle>
              <circle
                class="ring-fill green"
                cx="18"
                cy="18"
                r="15.9"
                stroke-dasharray="90, 100"
              ></circle>
              <text x="18" y="20.5" class="chart-text">90%</text>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<div class="nav-fixed-wrap">
  <div class="custom-nav-bar">
    <div class="nav-tab active">
      <i class="fas fa-home"></i>
      <span>DASHBOARD</span>
    </div>
    <div class="nav-tab" (click)="goToPage('patrol-logs')">
      <i class="fas fa-file-alt"></i>
      <span>Reports</span>
    </div>
   
    <div class="nav-tab" (click)="goToPage('alerts')">
      <i class="fas fa-bell"></i>
      <span>ALERTS</span>
    </div>
    <div class="nav-tab" (click)="openProfile()">
      <i class="fas fa-user-circle"></i>
      <span>PROFILE</span>
    </div>
  </div>
</div>
