<ion-content [fullscreen]="true" class="premium-wrapper">
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="hero-header">
    <div class="header-overlay"></div>
    <div class="header-content">
      <div class="nav-bar-stack">
        <div class="top-row">
          <button (click)="goBack()" class="glass-btn">
            <ion-icon name="chevron-back-outline"></ion-icon>
          </button>
          <h1>Onsite Details</h1>
        </div>
      </div>
    </div>
  </div>

  <div class="main-container" *ngIf="attendanceData">
    
    <div class="detail-card photo-card">
      <div class="card-header-line">
        <span class="label">Verified Selfie</span>
        <span class="badge" [class.entry]="attendanceData.type === 'ENTRY'">{{ attendanceData.type || 'ONSITE' }}</span>
      </div>
      <div class="image-frame">
        <img [src]="attendanceData.photo" alt="Attendance Photo" (click)="openZoom(attendanceData.photo)">
      </div>
    </div>

    <div class="detail-card info-card">
      <div class="info-item">
        <div class="icon-box"><ion-icon name="person"></ion-icon></div>
        <div class="text-data">
          <small>Ranger Name</small>
          <p>{{ attendanceData.rangerName }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="icon-box"><ion-icon name="map"></ion-icon></div>
        <div class="text-data">
          <small>Location Name</small>
          <p>{{ attendanceData.geofence }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="icon-box"><ion-icon name="time"></ion-icon></div>
        <div class="text-data">
          <small>Timestamp</small>
          <p>{{ attendanceData.createdAt | date: 'dd MMM yyyy • hh:mm a' }}</p>
        </div>
      </div>
    </div>



  </div>
</ion-content>
