<ion-content [fullscreen]="true" class="premium-wrapper">
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="hero-header">
    <div class="header-overlay"></div>
    <div class="header-content">
      <div class="nav-bar-stack">
        <div class="top-row">
          <button (click)="goBack()" class="glass-btn">
            <ion-icon name="chevron-back-outline"></ion-icon>
          </button>
          <h1>{{ 'ATTENDANCE.TITLE' | translate }} Details</h1>
        </div>
      </div>
    </div>
  </div>

  <div class="main-container" *ngIf="attendance">
    
    <div class="detail-card photo-card">
      <div class="card-header-line">
        <span class="label">Verified Selfie</span>
        <span class="badge" [class.entry]="attendance.type === 'ENTRY'">{{ attendance.type }}</span>
      </div>
      <div class="image-frame">
        <img [src]="attendance.photo" alt="Attendance Photo">
      </div>
    </div>

    <div class="detail-card info-card">
      <div class="info-item">
        <div class="icon-box"><ion-icon name="person"></ion-icon></div>
        <div class="text-data">
          <small>Ranger Name</small>
          <p>{{ attendance.rangerName }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="icon-box"><ion-icon name="map"></ion-icon></div>
        <div class="text-data">
          <small>Region & Geofence</small>
          <p>{{ attendance.region }} - {{ attendance.geofence }}</p>
        </div>
      </div>

      <div class="info-item">
        <div class="icon-box"><ion-icon name="time"></ion-icon></div>
        <div class="text-data">
          <small>Timestamp</small>
          <p>{{ attendance.createdAt | date: 'dd MMM yyyy • hh:mm a' }}</p>
        </div>
      </div>
    </div>

    <div class="detail-card map-card">
      <span class="label">Location Visual</span>
      <div id="detailMap" class="mini-map"></div>
    </div>

  </div>
</ion-content>
