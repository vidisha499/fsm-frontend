<ion-content [fullscreen]="true" style="--background: #fdfdfd;">

  <div style="position: relative; height: 240px; background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; clip-path: ellipse(110% 100% at 50% 0%);">
    <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7));"></div>
    
    <div style="position: relative; padding: 40px 25px; display: flex; justify-content: space-between; align-items: flex-start;">
      <button (click)="toggleMenu(true)" style="background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); color: white; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <ion-icon name="menu-outline" style="font-size: 24px;"></ion-icon>
      </button>

      <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
        <div class="tracking-pill">
          <div class="active-dot"></div>
          <span>SYSTEM OVERVIEW</span>
        </div>
        <p style="margin: 0; font-size: 28px; font-weight: 900; color: white; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
          Super Admin
        </p>
      </div>
    </div>
  </div>

  <div class="location-container">
    <div class="location-pill">
      <div style="display: flex; align-items: center; gap: 15px;">
        <div style="text-align: center;">
          <h2 style="margin: 0; color: #10b981; font-weight: 900;">12</h2>
          <span style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Companies</span>
        </div>
        <div style="width: 1px; height: 30px; background: #e2e8f0;"></div>
        <div style="text-align: center;">
          <h2 style="margin: 0; color: #1e293b; font-weight: 900;">145</h2>
          <span style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Total Rangers</span>
        </div>
      </div>
      <i class="fas fa-shield-alt" style="color: #065431; font-size: 18px;"></i>
    </div>

    <div style="margin-top: 35px;">
      <h3 class="section-title">Administrative Modules</h3>
      <div class="module-grid">
        
        <div class="module-card card-blue" (click)="goToPage('manage-companies')">
          <div class="icon-bg"><i class="fas fa-building"></i></div>
          <p>MANAGE<br>COMPANIES</p>
          <i class="fas fa-paw watermark"></i>
        </div>

        <div class="module-card card-green" (click)="goToPage('global-incidents')">
          <div class="icon-bg"><i class="fas fa-exclamation-triangle"></i></div>
          <p>GLOBAL<br>INCIDENTS</p>
          <i class="fas fa-fire watermark"></i>
        </div>

        <div class="module-card card-yellow" (click)="goToPage('system-logs')">
          <div class="icon-bg"><i class="fas fa-server"></i></div>
          <p>SYSTEM<br>LOGS</p>
          <i class="fas fa-paw watermark"></i>
        </div>

        <div class="module-card card-red" (click)="goToPage('roles')">
          <div class="icon-bg"><i class="fas fa-users-cog"></i></div>
          <p>ROLE<br>MANAGEMENT</p>
          <i class="fas fa-shield-alt watermark"></i>
        </div>

      </div>
    </div>
  </div>
</ion-content>

<div class="nav-fixed-wrap">
    <div class="custom-nav-bar">
        <div class="nav-tab active">
            <i class="fas fa-home"></i>
            <span>DASHBOARD</span>
        </div>

        <div class="nav-tab" (click)="goToPage('manage-companies')">
            <i class="fas fa-building"></i>
            <span>COMPANIES</span>
        </div>

        <div class="sos-anchor">
            <div class="sos-circle" style="background: #0d9488; box-shadow: 0 12px 25px rgba(13, 148, 136, 0.4);">
                <i class="fas fa-plus"></i>
                <span>ADD</span>
            </div>
        </div>

        <div class="nav-tab" (click)="goToPage('global-incidents')">
            <i class="fas fa-exclamation-triangle"></i>
            <span>ALERTS</span>
        </div>

        <div class="nav-tab" (click)="openSettings()">
            <i class="fas fa-user-shield"></i>
            <span>ADMIN</span>
        </div>
    </div>
</div>
