<ion-content [fullscreen]="true">
    <div class="screen" id="s-analytics">
      

      <div class="toolbar">
        <div class="tbar-left">
          <ion-back-button defaultHref="/admin" text="" icon="chevron-back" class="tbar-btn"></ion-back-button>
          <div>
            <div class="tbar-title">Analytics</div>
            <div class="tbar-sub">Deep Insights · Admin</div>
          </div>
        </div>
        <div class="tbar-right">
          <button class="filter-icon-btn" (click)="isFilterCollapsed = !isFilterCollapsed">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            <div class="filter-active-dot" *ngIf="!isFilterCollapsed"></div>
          </button>
          <button class="tbar-btn refresh-btn" [class.spinning]="isRefreshing" (click)="doRefresh()">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
      </div>

      <div class="filter-bar" [class.collapsed]="isFilterCollapsed">
        <select class="fselect"><option>All Ranges</option></select>
        <select class="fselect"><option>All Beats</option></select>
        <div class="date-chips">
          <div class="dchip" [class.active]="activeDateFilter==='today'" (click)="activeDateFilter='today'">Today</div>
          <div class="dchip" [class.active]="activeDateFilter==='week'" (click)="activeDateFilter='week'">Week</div>
          <div class="dchip" [class.active]="activeDateFilter==='month'" (click)="activeDateFilter='month'">Month</div>
        </div>
      </div>

      <div class="content">
        <div class="cat-tabs">
          <button *ngFor="let cat of catList" 
                  class="ctab" 
                  [class.active]="activeTab === cat.id" 
                  (click)="setAnaCat(cat.id)">
            {{ cat.label }}
          </button>
        </div>

   
<div class="sub-tabs-container">
  <div class="sub-tabs">
    <div *ngFor="let s of displayProgList" 
         class="stile" 
         [class.active]="activeSubId === s.id" 
         (click)="setAnaSub(s.id)">
      <div class="stile-val" [style.color]="s.color">
        {{ s.val?.toLocaleString() }}
      </div>
      <div class="stile-lbl">{{ s.emoji }} {{ s.label }}</div>
    </div>
  </div>
</div>

<div id="ana-charts-area">
  <div class="card" *ngIf="displayProgList.length">
    <div class="card-hdr">
      <div class="card-title">Sub-Category Overview</div>
      <div class="card-pill">{{ currentCatSubsCount }} categories</div>
    </div>
    <div class="card-body">
      <div class="prog-list">
        <div class="prog-item" *ngFor="let p of displayProgList">
          <div class="prog-row">
            <span class="prog-lbl">{{p.emoji}} {{p.label}}</span>
            <span class="prog-val">{{p.val?.toLocaleString()}}</span>
          </div>
          <div class="prog-bg">
            <div class="prog-fill" [style.width.%]="p.pct" [style.background]="p.color"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card-hdr">
    <div>
      <div class="card-title">{{ ch.title }}</div>
      <div class="card-sub">{{ ch.sub }}</div>
    </div>
  </div>
  <div class="card-body">
    <div style="height:200px; position:relative"> 
      <canvas [id]="ch.id"></canvas>
    </div>
  </div>
</div>


          <div class="card">
            <div class="card-hdr"><div class="card-title">Recent Activity</div></div>
            <div class="act-log">
              <div class="act-item"*ngFor="let a of displayActivity">
                <div class="act-dcol">
                  <div class="act-dot" [style.background]="a.d"></div>
                  <div class="act-line"></div>
                </div>
                <div>
                  <div class="act-ttl">{{ a.t }}</div>
                  <div class="act-meta">{{ a.m }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </ion-content>
