<ion-content [fullscreen]="true">
  <div class="premium-wrapper">
    <!-- Ambient Glow Effects -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- Hero Header -->
    <div class="hero-header">
      <div class="header-overlay"></div>
      <div class="header-content">
        <div class="nav-bar">
          <div class="left-section">
            <button (click)="goBack()" class="glass-btn">
              <ion-icon name="arrow-back-outline"></ion-icon>
            </button>
            <h1>Task Management</h1>
          </div>
          <div class="right-section">
            <button class="filter-toggle-btn" (click)="loadTasks()">
              <ion-icon name="refresh-outline" *ngIf="!isLoading"></ion-icon>
              <ion-spinner name="crescent" color="light" *ngIf="isLoading"></ion-spinner>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Status Tabs -->
      <div class="status-tabs-wrapper">
        <div class="status-tabs">
          <div class="tab" [class.active]="statusFilter === 'pending'" (click)="statusFilter = 'pending'">
            PENDING
          </div>
          <div class="tab" [class.active]="statusFilter === 'completed'" (click)="statusFilter = 'completed'">
            COMPLETED
          </div>
        </div>
      </div>

      <!-- Task List -->
      <div class="task-list">
        <div class="task-row-compact animate__animated animate__fadeInUp" 
             *ngFor="let task of filteredTasks; let i = index"
             [style.animation-delay]="(i * 0.1) + 's'">

          <div class="mini-thumb">
            <div class="icon-box">
              <i class="fas fa-clipboard-list"></i>
            </div>
            <div class="priority-indicator" [attr.data-priority]="task.priority"></div>
          </div>

          <div class="row-content">
            <div class="top-line">
              <span class="type-text">{{ task.category || 'GENERAL' }}</span>
              <span class="log-date">{{ formatDate(task.created_at) }}</span>
            </div>
            <h2 class="task-title">{{ task.title || task.task_name || 'New Task' }}</h2>
            <div class="assigned-line">
              <ion-icon name="person-outline"></ion-icon>
              <span>{{ task.assigned_to_name || 'Unassigned' }}</span>
            </div>
          </div>

          <div class="row-actions">
            <ion-icon name="chevron-forward" class="chevron"></ion-icon>
          </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" *ngIf="filteredTasks.length === 0 && !isLoading">
          <i class="fas fa-tasks"></i>
          <p>No tasks found in this section</p>
        </div>

        <!-- Skeleton Loader -->
        <div *ngIf="isLoading" style="padding: 10px 0;">
          <div class="task-row-compact" *ngFor="let s of [1,2,3,4]">
            <ion-skeleton-text animated style="width: 50px; height: 50px; border-radius: 12px;"></ion-skeleton-text>
            <div style="flex: 1;">
              <ion-skeleton-text animated style="width: 40%; height: 12px; margin-bottom: 8px;"></ion-skeleton-text>
              <ion-skeleton-text animated style="width: 80%; height: 16px; margin-bottom: 8px;"></ion-skeleton-text>
              <ion-skeleton-text animated style="width: 30%; height: 10px;"></ion-skeleton-text>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Floating Action Button for Adding New Task (Admin/Manager Only) -->
    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button class="premium-fab">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </div>
</ion-content>
